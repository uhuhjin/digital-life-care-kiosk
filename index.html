<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메가MGC커피 키오스크 시안</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <main class="kiosk-screen" aria-label="메가MGC커피 키오스크">
      <header class="screen-header">
        <div class="utility-bar">
          <button class="utility-button home-button" type="button">처음으로</button>
          <h1>메가엠지씨커피</h1>
          <button class="utility-button language-button" type="button">LANGUAGE</button>
        </div>

        <nav class="main-tab-bar" id="main-tab-bar" aria-label="메인 메뉴 탭"></nav>
        <div class="sub-tab-bar" id="sub-tab-bar" aria-label="세부 메뉴 탭"></div>
      </header>

      <section class="menu-section">
        <div class="product-grid" id="product-grid" aria-live="polite"></div>
        <div class="grid-pagination" id="grid-pagination">
          <button class="page-button" id="prev-page-button" type="button" aria-label="이전 페이지">&lt;</button>
          <span class="page-indicator" id="page-indicator">1 / 1</span>
          <button class="page-button" id="next-page-button" type="button" aria-label="다음 페이지">&gt;</button>
        </div>
      </section>

      <section class="order-section">
        <div class="order-table-panel">
          <div class="order-table-head">
            <span>메뉴</span>
            <span>수량</span>
            <span>가격</span>
          </div>
          <div class="order-list" id="order-list"></div>
        </div>

        <aside class="payment-panel">
          <button class="clear-circle-button" id="clear-cart-button" type="button">전체<br>삭제</button>

          <div class="payment-status">
            <div class="status-line">
              <span>남은시간</span>
              <strong id="timer-value">117초</strong>
            </div>
            <div class="status-line">
              <span>선택한 상품</span>
              <strong id="item-count">0개</strong>
            </div>
          </div>

          <button class="payment-button" id="checkout-button" type="button">
            <span class="payment-label">총 결제금액</span>
            <strong id="total-price">0원</strong>
            <span class="payment-action">결제하기</span>
          </button>
        </aside>
      </section>
    </main>
  </div>

  <div class="modal hidden" id="option-modal" role="dialog" aria-modal="true" aria-labelledby="option-title">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <p class="modal-kicker">옵션 선택</p>
          <h2 id="option-title">메뉴 옵션</h2>
        </div>
        <button class="modal-close" id="close-option-button" type="button" aria-label="닫기">×</button>
      </div>

      <div class="option-preview">
        <div class="option-visual" id="option-visual"></div>
        <div class="option-copy">
          <strong id="option-name"></strong>
          <p id="option-description"></p>
          <p class="option-base-price" id="option-base-price"></p>
        </div>
      </div>

      <div class="option-groups" id="option-groups"></div>

      <div class="modal-foot">
        <div class="option-total">
          <span>선택 금액</span>
          <strong id="option-total-price">0원</strong>
        </div>
        <button class="confirm-button" id="add-to-cart-button" type="button">담기</button>
      </div>
    </div>
  </div>

  <div class="modal hidden" id="checkout-modal" role="dialog" aria-modal="true" aria-labelledby="checkout-title">
    <div class="modal-card checkout-card">
      <div class="modal-head">
        <div>
          <p class="modal-kicker">주문 요약</p>
          <h2 id="checkout-title">결제 전 확인</h2>
        </div>
        <button class="modal-close" id="close-checkout-button" type="button" aria-label="닫기">×</button>
      </div>

      <div class="checkout-list" id="checkout-summary"></div>

      <div class="modal-foot">
        <div class="option-total">
          <span>총 결제금액</span>
          <strong id="checkout-total-price">0원</strong>
        </div>
        <button class="confirm-button" id="confirm-checkout-button" type="button">결제 흐름 보기</button>
      </div>
    </div>
  </div>

  <template id="main-tab-template">
    <button class="main-tab" type="button"></button>
  </template>

  <template id="sub-tab-template">
    <button class="sub-tab" type="button"></button>
  </template>

  <template id="product-card-template">
    <button class="product-card" type="button">
      <div class="product-top">
        <span class="zoom-mark">⌕</span>
      </div>
      <div class="product-visual"></div>
      <div class="product-meta">
        <p class="product-name"></p>
        <strong class="product-price"></strong>
      </div>
    </button>
  </template>

  <template id="order-row-template">
    <div class="order-row">
      <div class="order-menu">
        <strong class="order-name"></strong>
        <p class="order-option"></p>
      </div>
      <div class="order-qty-wrap">
        <button class="qty-button minus" type="button" aria-label="수량 줄이기">-</button>
        <span class="order-qty"></span>
        <button class="qty-button plus" type="button" aria-label="수량 늘리기">+</button>
      </div>
      <strong class="order-price"></strong>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
